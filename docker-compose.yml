services:
  mysql:
    image: mysql:8.0
    container_name: ai-friends-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aifriends}
      MYSQL_USER: ${MYSQL_USER:-aifriends}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aifriends1234}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    ports:
      - "3309:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root1234}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ai-friends-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-friends-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # MySQL 접속 (컨테이너 내부 포트 3306으로 접속)
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-aifriends}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER:-aifriends}
      DB_PASSWORD: ${MYSQL_PASSWORD:-aifriends1234}
      # Gemini API
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ai-friends-net

volumes:
  mysql-data:
    name: ai-friends-mysql-data

networks:
  ai-friends-net:
    name: ai-friends-net
    driver: bridge
