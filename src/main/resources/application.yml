spring:
  application:
    name: ai-friends

  profiles:
    # 기본 프로파일: 로컬에서 IDE로 실행할 때는 H2 사용
    # docker-compose로 띄울 때는 SPRING_PROFILES_ACTIVE=docker 가 자동 주입됨
    default: local

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
    open-in-view: false

  # ─────────────────────────────────────────────
  # Spring AI — 두 프로바이더 모두 등록해두고
  # `ollama` / `gemini` 프로파일로 활성화 모델을 선택한다.
  # ─────────────────────────────────────────────
  ai:
    # ⓐ 활성 모델 스위치 — 프로파일별로 덮어쓴다 (default: none)
    #    chat 외의 모달리티(embedding/image/audio/moderation)는 Day 1 에서는 쓰지 않으므로
    #    OpenAI 스타터가 끌어오는 자동설정들이 api-key 없이 기동 실패하지 않도록 전부 none 처리.
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none

    # ⓑ Ollama (로컬) 설정
    #    - IDE 로컬 실행: 환경변수 없음 → http://localhost:11434
    #    - ./run.sh 도커 실행: OLLAMA_BASE_URL=http://host.docker.internal:11434 주입됨
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: gemma3:4b

    # ⓒ OpenAI 호환 엔드포인트 (Gemini 를 OpenAI 스타터로 호출)
    #
    # ⚠️ OpenAI 호환 프로바이더(Gemini/Groq 등)는 실제 OpenAI 와 경로가 다르다.
    #    Spring AI 기본 completions-path = "/v1/chat/completions" 이지만,
    #    Gemini 는 "/v1beta/openai/chat/completions", Groq 은 "/openai/v1/chat/completions"
    #    이라 "/v1" 이 이중으로 붙으면 404 가 난다.
    #    → 공용으로 "/chat/completions" 로 오버라이드하고, 각 프로파일의 base-url 에
    #      provider 고유 prefix 를 포함시킨다.
    openai:
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        completions-path: /chat/completions
        options:
          model: ${GEMINI_MODEL:gemini-2.5-flash-lite}

# SQL 로그는 JPA가 아닌 P6Spy로만 출력 (바인드 파라미터 치환된 형태)

server:
  port: 8080

# Gemini API (공식 문서: https://ai.google.dev/gemini-api/docs)
# curl 예제와 동일: base-url + /models/{model}:generateContent, 헤더 x-goog-api-key
# (Day 1 이후 Spring AI ChatClient 로 대체되지만 기존 RestClient 데모 코드를 위해 유지)
gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com/v1beta
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}

---
# =========================================================
# local 프로파일 (IDE 실행 기본값): H2 인메모리
# =========================================================
spring:
  config:
    activate:
      on-profile: local

  datasource:
    driver-class-name: org.h2.Driver

---
# =========================================================
# docker 프로파일 (docker-compose 실행 시): MySQL 8
# =========================================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 컨테이너를 띄울 때마다 스키마 초기화 (강의용)
      # 운영 전환 시 validate + Flyway/Liquibase 로 교체
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

---
# =========================================================
# ollama 프로파일: 로컬 Ollama 로 호출
# 사용 예 (도커): .env 에 SPRING_PROFILES_ACTIVE=docker,ollama
# 사용 예 (IDE) : SPRING_PROFILES_ACTIVE=local,ollama
# =========================================================
spring:
  config:
    activate:
      on-profile: ollama

  ai:
    model:
      chat: ollama

---
# =========================================================
# gemini 프로파일: OpenAI 호환 엔드포인트로 Gemini 호출
# 사용 예 (도커): .env 에 SPRING_PROFILES_ACTIVE=docker,gemini
# 사용 예 (IDE) : SPRING_PROFILES_ACTIVE=local,gemini
# =========================================================
spring:
  config:
    activate:
      on-profile: gemini

  ai:
    model:
      chat: openai

---
# =========================================================
# groq 프로파일 (Day 1 과제 2): OpenAI 호환 엔드포인트로 Groq 호출
# 사용 예 (도커): .env 에 SPRING_PROFILES_ACTIVE=docker,groq
# 사용 예 (IDE) : SPRING_PROFILES_ACTIVE=local,groq
#
# 핵심:
#   - 스타터는 그대로 spring-ai-starter-model-openai 재활용
#   - base-url 만 Groq 엔드포인트로, api-key 는 GROQ_API_KEY 로 덮어쓴다
#   - 자바 코드는 단 한 줄도 손대지 않는다 (과제 2 의 핵심 채점 포인트)
# =========================================================
spring:
  config:
    activate:
      on-profile: groq

  ai:
    model:
      chat: openai

    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/v1
      chat:
        # ⚠️ 위 공통 섹션과 동일 이유 — 기본 completions-path 가 "/v1/chat/completions" 라
        #    base-url 끝의 "/v1" 과 겹쳐 "/openai/v1/v1/chat/completions" 404 를 만든다.
        completions-path: /chat/completions
        options:
          model: ${GROQ_MODEL:llama-3.3-70b-versatile}
