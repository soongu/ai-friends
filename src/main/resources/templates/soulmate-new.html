<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0a18" />
  <title>새 친구 만들기 | AI Friends</title>

  <!-- 한글 웹폰트: 본문 Pretendard, 강조 Noto Serif KR, 모노 JetBrains Mono -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" th:href="@{/css/variables.css}" />
  <link rel="stylesheet" th:href="@{/css/base.css}" />
  <link rel="stylesheet" th:href="@{/css/animations.css}" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/soulmate-create.css}" />
  <link rel="stylesheet" th:href="@{/css/card.css}" />
</head>
<body>
  <div class="app-root" data-app-root>
    <main class="main-container main-container--create">

      <div class="create" data-step="1">
        <div class="create__bg" aria-hidden="true"></div>

        <!-- ============================================================
             헤더 — 뒤로 + Step Eyebrow + 타이틀
             ============================================================ -->
        <header class="create__header">
          <a class="create__back" href="/" data-create-back aria-label="뒤로가기">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>
          <div class="create__title-block">
            <span class="create__eyebrow" data-create-eyebrow>01 / 04 · NAME &amp; GENDER</span>
            <span class="create__title" data-create-title>Create New Soulmate</span>
          </div>
        </header>

        <!-- ============================================================
             Step 인디케이터 (4 dot)
             ============================================================ -->
        <div class="create__steps" data-create-step-indicator aria-hidden="true">
          <div class="create__step-dot create__step-dot--active" data-step-dot="1"><span>01</span></div>
          <div class="create__step-dot" data-step-dot="2"><span>02</span></div>
          <div class="create__step-dot" data-step-dot="3"><span>03</span></div>
          <div class="create__step-dot" data-step-dot="4"><span>04</span></div>
        </div>

        <!-- ============================================================
             본문 — Step 1~4 (한 화면에 두고 [hidden] 토글)
             ============================================================ -->
        <div class="create__body" data-create-steps>

          <!-- Step 1: 이름·성별 -->
          <section class="create-step" data-step="1">
            <p class="create__hint">
              어떤 친구를 만들어볼까요? 이름과 성별부터 정해주세요.
            </p>
            <input
              type="text"
              class="create__name-input"
              data-create-name
              placeholder="이름을 입력해주세요…"
              maxlength="50"
            />
            <div class="create__gender-row" data-create-gender role="group" aria-label="성별 선택">
              <button type="button" class="create__gender" data-gender="FEMALE">
                <span class="create__gender-icon" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="9" r="6" stroke="currentColor" stroke-width="1.8" fill="none"/>
                    <path d="M12 15v6M9 19h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
                <span>여성</span>
                <span class="create__gender-mono">FEMALE</span>
              </button>
              <button type="button" class="create__gender" data-gender="MALE">
                <span class="create__gender-icon" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <circle cx="10" cy="14" r="6" stroke="currentColor" stroke-width="1.8" fill="none"/>
                    <path d="M14 10L20 4M16 4h4v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span>남성</span>
                <span class="create__gender-mono">MALE</span>
              </button>
            </div>
          </section>

          <!-- Step 2: 캐릭터 카드 그리드 (1열, .smcard 동적 렌더) -->
          <section class="create-step" data-step="2" hidden>
            <p class="create__hint" data-create-image-hint>
              마음에 드는 친구를 골라주세요.<br/>
              ▶ 버튼을 누르면 짧게 인사해줘요.
            </p>
            <div class="create__image-grid" data-create-image-grid aria-label="캐릭터 선택">
              <!-- js/pages/soulmate-create/index.js 가 .smcard 들 성별별 렌더 -->
            </div>
          </section>

          <!-- Step 3: 성격·취미·말투 (chip-section, 최대 3개씩) -->
          <section class="create-step" data-step="3" hidden>
            <p class="create__hint--small">
              — 각 항목당 최대 3개까지 선택할 수 있어요 —
            </p>

            <section class="chip-section" data-create-personality role="group" aria-label="성격 선택">
              <div class="chip-section__head">
                <h3 class="chip-section__title">
                  성격
                  <span class="chip-section__title-tag">PERSONALITY</span>
                </h3>
                <span class="chip-section__counter" data-create-personality-counter>0 / 3</span>
              </div>
              <div class="chip-grid" data-create-personality-chips></div>
            </section>

            <section class="chip-section" data-create-hobbies role="group" aria-label="취미 선택">
              <div class="chip-section__head">
                <h3 class="chip-section__title">
                  취미
                  <span class="chip-section__title-tag">HOBBIES</span>
                </h3>
                <span class="chip-section__counter" data-create-hobbies-counter>0 / 3</span>
              </div>
              <div class="chip-grid" data-create-hobbies-chips></div>
            </section>

            <section class="chip-section" data-create-speech role="group" aria-label="말투 선택">
              <div class="chip-section__head">
                <h3 class="chip-section__title">
                  말투
                  <span class="chip-section__title-tag">SPEECH</span>
                </h3>
                <span class="chip-section__counter" data-create-speech-counter>0 / 3</span>
              </div>
              <div class="chip-grid" data-create-speech-chips></div>
            </section>
          </section>

          <!-- Step 4: 요약 카드 + 직접 추가 (커스텀 행) -->
          <section class="create-step" data-step="4" hidden>
            <p class="create__hint--small">— SUMMARY · 인사 카피 미리보기 —</p>
            <div class="summary-card" data-create-summary>
              <!-- JS 가 summary-card__cut / face / nametag / body 채움 -->
            </div>

            <p class="create__hint--small" style="margin-top: 6px;">— 직접 추가하기 (선택) —</p>

            <div class="custom-row">
              <div class="custom-row__label">ADD PERSONALITY</div>
              <div class="custom-row__field">
                <input type="text" class="custom-row__input" data-custom-personality placeholder="예: 엉뚱한" maxlength="20" />
                <button type="button" class="custom-row__add" data-add-personality aria-label="성격 직접 추가">＋</button>
              </div>
              <div class="custom-row__chips" data-custom-personality-chips></div>
            </div>

            <div class="custom-row">
              <div class="custom-row__label">ADD HOBBY</div>
              <div class="custom-row__field">
                <input type="text" class="custom-row__input" data-custom-hobby placeholder="예: 도예" maxlength="20" />
                <button type="button" class="custom-row__add" data-add-hobby aria-label="취미 직접 추가">＋</button>
              </div>
              <div class="custom-row__chips" data-custom-hobby-chips></div>
            </div>

            <div class="custom-row">
              <div class="custom-row__label">ADD SPEECH</div>
              <div class="custom-row__field">
                <input type="text" class="custom-row__input" data-custom-speech placeholder="예: 사투리 섞어" maxlength="20" />
                <button type="button" class="custom-row__add" data-add-speech aria-label="말투 직접 추가">＋</button>
              </div>
              <div class="custom-row__chips" data-custom-speech-chips></div>
            </div>
          </section>

        </div>

        <!-- ============================================================
             푸터 — 다음 / 만들기 (Step 4 만 submit)
             ============================================================ -->
        <div class="create__footer">
          <button type="button" class="create__next" data-create-next disabled>
            <span>다음</span>
            <span class="create__next-jp">Next →</span>
          </button>
          <button type="button" class="create__next create__submit" data-create-submit hidden>
            <span aria-hidden="true">✦</span>
            <span>만들기</span>
            <span class="create__next-jp">Create Soulmate</span>
          </button>
        </div>
      </div>

    </main>
  </div>

  <script type="module" th:src="@{/js/pages/soulmate-create/index.js}"></script>
</body>
</html>
